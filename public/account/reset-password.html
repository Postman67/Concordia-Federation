<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concordia — Reset Password</title>
  <style>
    :root {
      --bg: #11111b; --card: #1e1e2e; --text: #cdd6f4; --muted: #a6adc8;
      --accent: #4f46e5; --accent-hover: #6366f1; --error: #f38ba8; --ok: #a6e3a1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 16px;
    }
    .card {
      background: var(--card); border-radius: 12px; padding: 32px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.35rem; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; color: var(--muted); margin: 14px 0 6px; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #313244; background: #181825; color: var(--text);
      font-size: 1rem; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; margin-top: 22px; padding: 11px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: .5; cursor: default; }
    .msg { margin-top: 16px; font-size: .9rem; display: none; }
    .msg.error { color: var(--error); display: block; }
    .msg.ok    { color: var(--ok);    display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p class="sub">Choose a new password for your Concordia account.</p>

    <form id="form" novalidate>
      <label for="password">New password</label>
      <input id="password" type="password" autocomplete="new-password"
             placeholder="8+ chars, 1 uppercase, 1 number" required />
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" autocomplete="new-password" required />
      <button id="btn" type="submit">Reset password</button>
    </form>
    <p id="msg" class="msg"></p>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const form = document.getElementById('form');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btn');

    function show(text, cls) { msg.textContent = text; msg.className = 'msg ' + cls; }

    if (!token) {
      form.style.display = 'none';
      show('Missing reset token — use the link from your email.', 'error');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if (password !== confirm) return show('Passwords do not match.', 'error');

      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/password-reset/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          const detail = data.errors?.[0]?.msg ?? data.error ?? 'Reset failed.';
          show(detail, 'error');
          btn.disabled = false;
          return;
        }
        form.style.display = 'none';
        show('Password updated — you can close this page and log in from the app.', 'ok');
      } catch {
        show('Network error. Try again.', 'error');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
