<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concordia — Verify Email</title>
  <style>
    :root {
      --bg: #11111b; --card: #1e1e2e; --text: #cdd6f4; --muted: #a6adc8;
      --accent: #4f46e5; --error: #f38ba8; --ok: #a6e3a1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 16px;
    }
    .card {
      background: var(--card); border-radius: 12px; padding: 32px;
      width: 100%; max-width: 420px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.35rem; margin-bottom: 12px; }
    p { color: var(--muted); font-size: .95rem; }
    .ok    { color: var(--ok); }
    .error { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email verification</h1>
    <p id="status">Verifying…</p>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const status = document.getElementById('status');

    if (!token) {
      status.textContent = 'Missing verification token — use the link from your email.';
      status.className = 'error';
    } else {
      fetch('/api/auth/verify-email/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      })
        .then(async (res) => {
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? 'Verification failed.');
          status.textContent = 'Email verified — you can close this page.';
          status.className = 'ok';
        })
        .catch((err) => {
          status.textContent = err.message;
          status.className = 'error';
        });
    }
  </script>
</body>
</html>
